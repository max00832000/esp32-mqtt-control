<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intimate Pulse V3 - Memory Mode</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --primary-gradient: linear-gradient(135deg, #ff007f 0%, #a020f0 100%);
            --glow-color: rgba(255, 0, 127, 0.5);
            --text-color: #f0f0f0;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: none;
        }

        .control-panel {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 380px;
            padding: 50px 20px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .device-name { margin-bottom: 30px; font-size: 1.4rem; letter-spacing: 3px; color: #666; }

        .knob-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring-svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-track { fill: none; stroke: #2a2a2a; stroke-width: 12; }

        .ring-progress {
            fill: none;
            stroke: url(#grad1);
            stroke-width: 14;
            stroke-linecap: round;
            stroke-dasharray: 628;
            stroke-dashoffset: 628;
            transition: stroke-dashoffset 0.15s ease, opacity 0.3s ease;
            opacity: 0.3; /* 預設暗淡 */
        }

        /* 當電源開啟時，圓環變亮 */
        .ring-progress.active { opacity: 1; filter: drop-shadow(0 0 8px var(--glow-color)); }

        .pulse-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: #222;
            color: #555;
            z-index: 10;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .pulse-button.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 0 40px var(--glow-color);
            transform: scale(1.02);
        }

        .intensity-display { font-size: 0.9rem; color: #555; margin-top: 10px; letter-spacing: 2px; }
        .value-text { color: #888; font-weight: bold; font-size: 1.3rem; transition: color 0.3s; }
        .value-text.active { color: #ff007f; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="device-name">INTIMATE PULSE V3</div>

        <div class="knob-container" id="knobContainer">
            <svg class="ring-svg" viewBox="0 0 220 220">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff007f;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#a020f0;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle class="ring-track" cx="110" cy="110" r="100"></circle>
                <circle id="progressRing" class="ring-progress" cx="110" cy="110" r="100"></circle>
            </svg>

            <button id="powerBtn" class="pulse-button" onclick="togglePower()">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                    <line x1="12" y1="2" x2="12" y2="12"></line>
                </svg>
            </button>
        </div>

        <div class="intensity-display">
            INTENSITY <span class="value-text" id="valText">0</span> %
        </div>
    </div>

    <script>
        const MQTT_URL = 'wss://broker.hivemq.com:8884/mqtt';
        const TOPIC_BRIGHTNESS = 'myhome/led/brightness';
        const client = mqtt.connect(MQTT_URL, { clientId: 'web_mem_' + Math.random().toString(16).slice(2, 10) });

        let isPowerOn = false;
        let savedBrightness = 30; // 記憶數值，預設 30

        const ring = document.getElementById('progressRing');
        const valText = document.getElementById('valText');
        const powerBtn = document.getElementById('powerBtn');

        // 初始化 UI 狀態
        updateUI(savedBrightness);

        function updateUI(val) {
            const offset = 628 - (val / 100) * 628;
            ring.style.strokeDashoffset = offset;
            valText.innerText = val;
            
            if (isPowerOn) {
                ring.classList.add('active');
                valText.classList.add('active');
                sendMqtt(val);
            } else {
                ring.classList.remove('active');
                valText.classList.remove('active');
                sendMqtt(0); // 關閉時發送 0 到 ESP32
            }
        }

        function sendMqtt(val) {
            if (client.connected) {
                const pwmValue = Math.round((val / 100) * 255);
                client.publish(TOPIC_BRIGHTNESS, pwmValue.toString(), { qos: 1 });
            }
        }

        function togglePower() {
            isPowerOn = !isPowerOn;
            if (isPowerOn) {
                powerBtn.classList.add('active');
            } else {
                powerBtn.classList.remove('active');
            }
            updateUI(savedBrightness); // 使用記憶的數值重新渲染
        }

        // 圓環滑動邏輯
        const container = document.getElementById('knobContainer');
        let isDragging = false;

        function handleMove(e) {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientY; // 修正觸控座標
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // 如果使用滑鼠，clientX/Y 直接抓，觸控則抓 e.touches[0]
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;

            const angle = Math.atan2(y - centerY, x - centerX) * 180 / Math.PI;
            let normalizedAngle = (angle + 90 + 360) % 360; 
            
            savedBrightness = Math.max(1, Math.round((normalizedAngle / 360) * 100));
            
            // 滑動時如果電源是關閉的，可以設計成自動開啟，或僅更新記憶值
            // 這裡採用「滑動即開啟」以符合直覺
            if (!isPowerOn) {
                isPowerOn = true;
                powerBtn.classList.add('active');
            }
            updateUI(savedBrightness);
        }

        container.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', handleMove);
        container.addEventListener('touchstart', (e) => { isDragging = true; });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', handleMove);

    </script>
</body>
</html>
