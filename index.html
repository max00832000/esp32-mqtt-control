<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intimate Pulse V2</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --primary-gradient: linear-gradient(135deg, #ff007f 0%, #a020f0 100%);
            --glow-color: rgba(255, 0, 127, 0.5);
            --text-color: #f0f0f0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: none; /* 防止移動端縮放 */
        }

        .control-panel {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 380px;
            padding: 50px 20px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* 旋鈕容器 */
        .knob-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 外圈圓環軌道 */
        .ring-svg {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-track {
            fill: none;
            stroke: #333;
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: url(#grad1);
            stroke-width: 14;
            stroke-linecap: round;
            stroke-dasharray: 628; /* 2 * PI * 100 */
            stroke-dashoffset: 628;
            transition: stroke-dashoffset 0.1s ease;
        }

        /* 中心按鈕 */
        .pulse-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: #222;
            color: white;
            z-index: 10;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pulse-button.active {
            background: var(--primary-gradient);
            box-shadow: 0 0 40px var(--glow-color);
        }

        /* 數值顯示 */
        .intensity-display {
            font-size: 0.9rem;
            color: #888;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .value-text {
            color: #ff007f;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="device-name" style="margin-bottom: 30px; font-size: 1.5rem; letter-spacing: 3px;">PULSE CONTROL</div>

        <div class="knob-container" id="knobContainer">
            <svg class="ring-svg" viewBox="0 0 220 220">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff007f;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#a020f0;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle class="ring-track" cx="110" cy="110" r="100"></circle>
                <circle id="progressRing" class="ring-progress" cx="110" cy="110" r="100"></circle>
            </svg>

            <button id="powerBtn" class="pulse-button" onclick="togglePower()">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                    <line x1="12" y1="2" x2="12" y2="12"></line>
                </svg>
            </button>
        </div>

        <div class="intensity-display">
            強度強度 <span class="value-text" id="valText">0</span> %
        </div>
    </div>

    <script>
        const MQTT_URL = 'wss://broker.hivemq.com:8884/mqtt';
        const TOPIC_BRIGHTNESS = 'myhome/led/brightness';
        const client = mqtt.connect(MQTT_URL, { clientId: 'web_' + Math.random().toString(16).slice(2, 10) });

        let isPowerOn = false;
        let brightness = 0;
        const ring = document.getElementById('progressRing');
        const valText = document.getElementById('valText');
        const powerBtn = document.getElementById('powerBtn');

        function updateUI(val) {
            const offset = 628 - (val / 100) * 628;
            ring.style.strokeDashoffset = offset;
            valText.innerText = val;
            
            // 同步 MQTT (加上節流避免過載)
            const pwmValue = Math.round((val / 100) * 255);
            if (client.connected) {
                client.publish(TOPIC_BRIGHTNESS, pwmValue.toString());
            }
        }

        function togglePower() {
            isPowerOn = !isPowerOn;
            if (isPowerOn) {
                powerBtn.classList.add('active');
                if (brightness === 0) { brightness = 30; updateUI(brightness); }
            } else {
                powerBtn.classList.remove('active');
                updateUI(0);
            }
        }

        // 圓環滑動邏輯
        const container = document.getElementById('knobContainer');
        let isDragging = false;

        function handleMove(e) {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const angle = Math.atan2(clientY - centerY, clientX - centerX) * 180 / Math.PI;
            let normalizedAngle = (angle + 90 + 360) % 360; 
            
            brightness = Math.round((normalizedAngle / 360) * 100);
            if (!isPowerOn && brightness > 0) {
                isPowerOn = true;
                powerBtn.classList.add('active');
            }
            updateUI(brightness);
        }

        container.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', handleMove);
        container.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', handleMove);

    </script>
</body>
</html>
